spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_REALM_URL}                                          # localhost:9000 → matches token iss
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL}/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE}
