services:
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - geardotcom_postgres_data:/var/lib/postgresql/data
    ports:
      - 5434:5432
    networks:
      - ecommerce-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  gateway-service:
    build: ./gateway
    container_name: gateway-service
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
    ports:
      - "8222:8222"
    networks:
      - ecommerce-network


  sale-service:
    build: ./sale-service
    container_name: sale-service
    ports:
      - "8081:8081"
    networks:
      - ecommerce-network

  #  keycloak_postgres:
  #    image: postgres:15
  #    environment:
  #      POSTGRES_DB: keycloak
  #      POSTGRES_USER: postgres
  #      POSTGRES_PASSWORD: root
  #      TZ: Asia/Ho_Chi_Minh   # <-- added here
  #    volumes:
  #      - keycloak_postgres_data:/var/lib/postgresql/data
  #    ports:
  #      - 5433:5432
