services:
  geardotcom_postgres:
    image: postgres:15
    container_name: geardotcom_postgres
    environment:
      POSTGRES_DB: geardotcom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - geardotcom_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - ecommerce-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  gateway-service:
    build: ./gateway
    container_name: gateway-service
    depends_on:
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://discovery-service:8761/eureka
      - KEYCLOAK_REALM_URL=http://localhost:9000/realms/geardotcom       # ← public URL, matches token iss
      - KEYCLOAK_INTERNAL_URL=http://identity:9000/realms/geardotcom     # ← internal Docker DNS, for JWK fetch
    ports:
      - "8222:8222"
    networks:
      - ecommerce-network

  sale-service:
    build: ./sale-service
    container_name: sale-service
    depends_on:
      - geardotcom_postgres
      - discovery-service
      - gateway-service
    volumes:
      - ./images:/app/uploads
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://discovery-service:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://geardotcom_postgres:5432/geardotcom
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_IMAGE_DIR=/app/uploads
      - SPRING_UPLOAD_IMAGE_URL=http://discovery-service:8222/api/v1/sale/products
    networks:
      - ecommerce-network

#  pgadmin:
#    image: dpage/pgadmin4:6.20
#    container_name: pgadmin
#    volumes:
#      - pgadmin:/var/lib/pgadmin
#    environment:
#      PGADMIN_DEFAULT_EMAIL: admin
#      PGADMIN_DEFAULT_PASSWORD: admin
#    networks:
