  #      - ecommerce-network
  #    healthcheck:
  #      test: ["CMD-SHELL", "pg_isready -U postgres"]
  #      interval: 10s
  #      timeout: 5s
  #      retries: 5

  identity:
    image: quay.io/keycloak/keycloak:21.0.2
    command: ['start-dev --import-realm']
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_PROXY: none
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://geardotcom:5432/geardotcom
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: root
      KC_HTTP_PORT: 9000
    ports:
      - 9000:9000
    volumes:
      - ./identity/themes/geardotcom/theme:/opt/keycloak/themes
      - ./identity/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - database
    networks:
      - ecommerce-network

